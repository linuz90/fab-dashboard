name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

      - name: Check diff hygiene
        run: git diff --check

      - name: Initialize demo config
        run: bun run cli init --demo --force
        env:
          FAB_DASHBOARD_HOME: ${{ github.workspace }}/local/demo
          FAB_DASHBOARD_STATE_HOME: ${{ github.workspace }}/local/state

      - name: Validate demo config
        run: bun run cli validate
        env:
          FAB_DASHBOARD_HOME: ${{ github.workspace }}/local/demo
          FAB_DASHBOARD_STATE_HOME: ${{ github.workspace }}/local/state
